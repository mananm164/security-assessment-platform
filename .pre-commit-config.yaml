repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(.env(\..*)?|frontend/package-lock.json|frontend/node_modules/|frontend/dist/|frontend/playwright-report/|frontend/test-results/|backend/.ruff_cache/|backend/.*/migrations/.*\.py|backend/.*/tests/)
