services:
  db:
    environment:
      POSTGRES_DB: sarp_e2e
      POSTGRES_USER: sarp_e2e
      POSTGRES_PASSWORD: sarp_e2e_password # pragma: allowlist secret - fictional E2E database password
    volumes:
      - e2e_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarp_e2e -d sarp_e2e"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    environment:
      DJANGO_SECRET_KEY: e2e-only-insecure-secret-key-for-local-ci # pragma: allowlist secret - fictional E2E key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      DATABASE_URL: postgresql://sarp_e2e:sarp_e2e_password@db:5432/sarp_e2e # pragma: allowlist secret - fictional E2E database URL
      AI_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
      E2E_TEST_MODE: "1"
      E2E_TEST_PASSWORD: ${E2E_TEST_PASSWORD:-change-me-e2e-only} # pragma: allowlist secret - placeholder only
    volumes:
      - ./backend:/app:ro

volumes:
  e2e_postgres_data:
